services:
  - type: web
    name: taskflow-api
    runtime: docker
    rootDir: backend
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-vercel-app.vercel.app

databases:
  - name: taskflow-db
    plan: free
